name: CI - Test Nginx Load Balancer

on:
  push:
    branches: [ main ]

jobs:
  test-load-balancer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start containers
        run: |
          docker compose up -d --build --scale app=3
          sleep 15

      - name: Test load balancing
        run: |
          echo "Sending requests to nginx..."
          for i in {1..10}
          do
            curl -s http://localhost/whoami
            echo ""
          done > responses.txt

          echo "Unique responses:"
          cat responses.txt | sort | uniq

          COUNT=$(cat responses.txt | sort | uniq | wc -l)

          if [ "$COUNT" -lt 2 ]; then
            echo "Load balancing NOT working"
            exit 1
          fi

          echo "Load balancing working"

      - name: Stop containers
        if: always()
        run: docker compose down
